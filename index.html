<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Pro - 职场全能手册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { transition: all 0.3s ease; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -5px rgba(0,0,0,0.1); border-color: #10b981; }
        .tab-active { background: #10b981; color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .filter-active { background: #10b981 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="bg-slate-900 text-white shadow-2xl sticky top-0 z-30 border-b border-emerald-500/20">
        <div class="container mx-auto px-6 py-6">
            <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg shadow-emerald-500/20 text-white">E</div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight uppercase">Excel <span class="text-emerald-400">Toolkit</span></h1>
                        <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em]">ALWAYS EXPANDED</p>
                    </div>
                </div>

                <div class="relative w-full lg:w-1/3">
                    <input type="text" id="searchInput" placeholder="搜索功能、场景或快捷键..." 
                        class="w-full p-3.5 pl-12 rounded-2xl text-slate-800 outline-none bg-white shadow-inner focus:ring-2 focus:ring-emerald-500 transition-all">
                    <svg class="w-5 h-5 absolute left-4 top-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <div class="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                    <button id="tabFunc" onclick="switchMode('func')" class="px-6 py-2 rounded-lg text-xs font-bold transition-all tab-active">实战函数</button>
                    <button id="tabKey" onclick="switchMode('key')" class="px-6 py-2 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white">大神快捷键</button>
                </div>
            </div>
            
            <div id="filterWrapper" class="flex flex-wrap gap-2 mt-6 justify-center">
                <button onclick="filterCat('all')" class="cat-btn px-4 py-1.5 rounded-full bg-slate-800 text-[10px] font-bold uppercase tracking-wider filter-active text-white">全部展示</button>
                <button onclick="filterCat('🔥 实战套路')" class="cat-btn px-4 py-1.5 rounded-full bg-slate-800 text-[10px] font-bold uppercase tracking-wider text-emerald-400 border border-emerald-500/30">🔥 实战套路</button>
                <button onclick="filterCat('查找/引用')" class="cat-btn px-4 py-1.5 rounded-full bg-slate-800 text-[10px] font-bold uppercase tracking-wider text-blue-400">查找/引用</button>
                <button onclick="filterCat('逻辑/文本')" class="cat-btn px-4 py-1.5 rounded-full bg-slate-800 text-[10px] font-bold uppercase tracking-wider text-orange-400">逻辑/文本</button>
                <button onclick="filterCat('统计/数学')" class="cat-btn px-4 py-1.5 rounded-full bg-slate-800 text-[10px] font-bold uppercase tracking-wider text-purple-400">统计/数学</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const functions = [
            { n: '固定除数(占比)', c: '统计/数学', d: '计算百分比时，锁定总数单元格。', s: '=B6/$B$2', info: '技巧：输入 B2 后按 F4 键快速加 $ 符号。向下填充时，$B$2 永远不动。', color: 'border-purple-500' },
            { n: '提取生日', c: '🔥 实战套路', d: '从身份证中提取 8 位生日。', s: '=TEXT(MID(A2,7,8),"0000-00-00")', info: 'MID截取第7位起的8位，TEXT将其转为标准日期。', color: 'border-emerald-500' },
            { n: '算周岁', c: '🔥 实战套路', d: '根据身份证精准计算年龄。', s: '=DATEDIF(TEXT(MID(A2,7,8),"0-00-00"),TODAY(),"y")', info: '计算生日到今天的完整年数，自动随年份更新。', color: 'border-emerald-500' },
            { n: '两表对账', c: '🔥 实战套路', d: '快速找出A表缺失于B表的内容。', s: '=IF(COUNTIF(Sheet2!A:A, A2)>0, "已匹配", "缺失")', info: '如果Sheet2里能数出A2的名字，就显示匹配。', color: 'border-emerald-500' },
            { n: '屏蔽错误', c: '🔥 实战套路', d: '让#N/A等错误显示为空白。', s: '=IFERROR(你的公式, "")', info: '放在最外层，如果里面的公式报错，表格就显示空白。', color: 'border-emerald-500' },
            { n: 'XLOOKUP', c: '查找/引用', d: '新代查找王，支持逆向查找。', s: '=XLOOKUP(值, 查找区, 结果区)', info: 'Office 365 专属。不需要数第几列，直接选结果区域。', color: 'border-blue-500' },
            { n: 'VLOOKUP', c: '查找/引用', d: '职场人必备的经典纵向查找。', s: '=VLOOKUP(值, 区域, 列号, 0)', info: '第四个参数填0代表精确匹配，不填可能会报错。', color: 'border-blue-500' },
            { n: '金额大写', c: '🔥 实战套路', d: '数字转人民币大写。', s: '=NUMBERSTRING(A2,2)', info: '隐藏福利函数。把123变成壹佰贰拾叁，财务必备。', color: 'border-emerald-500' },
            { n: '提取手机号', c: '🔥 实战套路', d: '从杂乱文本中提取手机号。', s: '=MID(A2,SEARCH("1",A2),11)', info: '假设手机号以1开头且共11位。', color: 'border-emerald-500' },
            { n: 'SUMIFS', c: '统计/数学', d: '满足多条件的求和。', s: '=SUMIFS(求和区, 区域1, 条件1...)', info: '注意：求和区在最前面，这是它和SUMIF最大的区别。', color: 'border-purple-500' }
        ];

        const shortcuts = [
            { n: '快速筛选', c: '效率', d: '开关筛选漏斗。', s: 'Ctrl + Shift + L', info: '不用鼠标点，瞬间开启表头筛选。', color: 'border-slate-800' },
            { n: '一键求和', c: '效率', d: '自动生成SUM公式。', s: 'Alt + =', info: '光标放在数据下方，秒出总计。', color: 'border-slate-800' },
            { n: '强制换行', c: '格式', d: '单元格内手动换行。', s: 'Alt + Enter', info: '解决文字挤在一起的排版噩梦。', color: 'border-slate-800' },
            { n: '快速填充', c: '神技', d: '智能识别模式填数据。', s: 'Ctrl + E', info: '拆分姓名、合并地址的最强黑科技。', color: 'border-slate-800' }
        ];

        let mode = 'func';
        let cat = 'all';

        function switchMode(m) {
            mode = m;
            document.getElementById('tabFunc').classList.toggle('tab-active', m==='func');
            document.getElementById('tabKey').classList.toggle('tab-active', m==='key');
            document.getElementById('filterWrapper').style.display = m==='func' ? 'flex' : 'none';
            render();
        }

        function filterCat(c) {
            cat = c;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.toggle('filter-active', b.innerText.includes(c) || (c==='all' && b.innerText==='全部展示'));
            });
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            const data = mode === 'func' ? functions : shortcuts;
            const filtered = data.filter(f => {
                const matchSearch = f.n.toLowerCase().includes(search) || f.d.includes(search);
                const matchCat = mode === 'key' || cat === 'all' || f.c === cat;
                return matchSearch && matchCat;
            });

            filtered.forEach(f => {
                const div = document.createElement('div');
                div.className = `card bg-white p-6 rounded-3xl border-t-[8px] ${f.color} shadow-sm`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <span>${f.c}</span>
                        <span>PRO TOOL</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-800 mb-2">${f.n}</h3>
                    <p class="text-slate-500 text-xs mb-6">${f.d}</p>
                    
                    <div class="copy-box bg-slate-50 p-4 rounded-2xl border border-slate-100 group relative active:scale-95 transition-all cursor-pointer mb-5" onclick="copy('${f.s}')">
                        <code class="text-emerald-600 font-mono text-xs block pr-8 leading-relaxed">${f.s}</code>
                        <svg class="w-4 h-4 absolute right-3 top-4 text-slate-300 group-hover:text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                    </div>

                    <div class="mt-auto bg-slate-50/80 p-4 rounded-2xl border-l-4 border-emerald-400">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2 flex items-center gap-1">
                            <span class="w-1 h-1 bg-emerald-500 rounded-full"></span> 详细用法
                        </h4>
                        <p class="text-[11px] text-slate-600 leading-relaxed italic">
                            ${f.info}
                        </p>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        window.copy = (t) => {
            navigator.clipboard.writeText(t);
            const tip = document.createElement('div');
            tip.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-2xl shadow-2xl z-50 font-bold text-sm animate-bounce border-b-4 border-emerald-500";
            tip.innerHTML = "✅ 已复制公式！";
            document.body.appendChild(tip);
            setTimeout(() => tip.remove(), 2000);
        };

        document.getElementById('searchInput').addEventListener('input', render);
        render();
    </script>
</body>
</html>
