<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 函数小助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-5">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-green-600">Excel Master Tools</h1>
            <p class="text-gray-500">点击公式即可自动复制</p>
        </header>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        const excelFunctions = [
            { name: 'XLOOKUP', desc: '全能查找王，支持逆向查找。', syntax: '=XLOOKUP(查找值, 查找区, 结果区)' },
            { name: 'VLOOKUP', desc: '纵向查找，匹配数据必备。', syntax: '=VLOOKUP(值, 区域, 列号, 0)' },
            { name: 'SUMIFS', desc: '多条件求和。', syntax: '=SUMIFS(求和区, 条件区, 条件)' },
            { name: 'DATEDIF', desc: '计算工龄、年龄。', syntax: '=DATEDIF(开始日, 结束日, "Y")' }
        ];

        const grid = document.getElementById('grid');
        excelFunctions.forEach(f => {
            const card = document.createElement('div');
            card.className = 'bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500';
            card.innerHTML = `
                <h3 class="text-xl font-bold text-blue-600 mb-2">${f.name}</h3>
                <p class="text-gray-600 text-sm mb-4">${f.desc}</p>
                <code class="block bg-gray-100 p-2 text-pink-600 rounded cursor-pointer hover:bg-gray-200" 
                      onclick="navigator.clipboard.writeText('${f.syntax}');alert('复制成功！')">${f.syntax}</code>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
